## Итоги недели

На этой неделе я:

✅ Познакомился с генератором статических сайтов **Hugo**
✅ Научился редактировать конфигурацию сайта
✅ Добавил свою биографию и фото
✅ Начал разбираться с системой Git

## Впечатления

Было очень интересно! Особенно понравилось, как быстро Hugo собирает сайт и как гибко можно настраивать внешний вид. Теперь понимаю, почему многие выбирают именно этот инструмент для создания личных страниц и портфолио.

## Планы на следующую неделю

- Изучить Git более подробно
- Разобраться с CI/CD
- Добавить на сайт свои проекты

До встречи через неделю!
